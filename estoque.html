<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Confeitaria - Estoque</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">ERP Confeitaria</div>
        <a href="index.html">Dashboard</a>
        <a href="atendimento.html">PDV / Balcão</a>
        <a href="caixa.html">Fluxo de Caixa</a>
        <a href="estoque.html" class="ativo">Estoque</a>
        <div style="flex: 1;"></div>
        <a href="cadastro_cliente.html">Clientes</a>
        <a href="cadastro_fornecedor.html">Fornecedores</a>
    </div>

    <div class="main-content">
        <div style="margin-bottom: 25px;">
            <h1 style="margin: 0; color: #0f172a; font-size: 28px; font-weight: 800;">Gestão de Estoque</h1>
            <p style="margin: 5px 0 0 0; color: #64748b; font-size: 15px;">Controle de insumos, embalagens e produtos finais.</p>
        </div>

        <div class="card-erp">
            <h3>Cadastrar Novo Item</h3>
            <form id="formEstoque" class="row">
                <div style="flex: 2;">
                    <label>Descrição do Item:</label>
                    <input type="text" id="nome" required placeholder="Ex: Farinha de Trigo 5kg">
                </div>
                <div>
                    <label>Categoria:</label>
                    <select id="tipo" required>
                        <option value="">Selecione...</option>
                        <option value="Produto Final">Produto Final</option>
                        <option value="Insumo">Insumo</option>
                        <option value="Embalagem">Embalagem</option>
                    </select>
                </div>
                <div>
                    <label>Estoque Inicial:</label>
                    <input type="number" id="quantidade" required min="0" value="0">
                </div>
                <div>
                    <label>Custo Unitário (R$):</label>
                    <input type="number" id="custo" required step="0.01" min="0" placeholder="0.00">
                </div>
                <div>
                    <label>Preço Venda (R$):</label>
                    <input type="number" id="valor" required step="0.01" min="0" placeholder="0.00">
                </div>
                <div style="display: flex; align-items: flex-end; margin-bottom: 15px;">
                    <button type="submit" style="width: 100%;">Registrar</button>
                </div>
            </form>
        </div>

        <div class="card-inventario">
            <h3 style="margin-top: 0; color: #1e293b; font-size: 16px; margin-bottom: 20px;">Inventário Atual</h3>
            <table>
                <thead>
                    <tr>
                        <th style="width: 50px;">ID</th>
                        <th>Produto / Insumo</th>
                        <th>Categoria</th>
                        <th>Qtd</th>
                        <th>Custo</th>
                        <th>Venda</th>
                        <th>Ações Gerenciais</th>
                    </tr>
                </thead>
                <tbody id="tabelaEstoque"></tbody>
            </table>
        </div>
    </div>

    <script src="js/estoque.js"></script>
</body>
</html>
