<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERP Confeitaria - Clientes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-logo">ERP Confeitaria</div>
        <a href="index.html">Dashboard</a>
        <a href="atendimento.html">PDV / Balcão</a>
        <a href="caixa.html">Fluxo de Caixa</a>
        <a href="estoque.html">Estoque</a>
        <div style="flex: 1;"></div>
        <a href="cadastro_cliente.html" class="ativo">Clientes</a>
        <a href="cadastro_fornecedor.html">Fornecedores</a>
    </div>

    <div class="main-content">
        <div style="margin-bottom: 30px;">
            <h1 style="margin: 0; color: #0f172a; font-size: 28px; font-weight: 800;">Gestão de Clientes</h1>
            <p style="margin: 5px 0 0 0; color: #64748b; font-size: 15px;">Cadastro centralizado de clientes.</p>
        </div>

        <div class="card-form">
            <h3 style="margin-top: 0; margin-bottom: 20px; border-bottom: 1px solid #e2e8f0; padding-bottom: 10px;">Novo Cliente</h3>
            <form id="formCliente">
                <div class="form-grid">
        <div class="col-8">
            <label>Nome Completo:</label>
            <input type="text" id="nome" required placeholder="Nome do cliente" class="input-moderno">
        </div>
        <div class="col-4">
            <label>CPF:</label>
            <input type="text" id="cpf" required placeholder="000.000.000-00" maxlength="14" class="input-moderno">
        </div>
    </div>

    <!-- Linha 2 (Corrigido para igualar ao Fornecedor: 7 e 5) -->
    <div class="form-grid">
        <div class="col-7">
            <label>E-mail Corporativo/Pessoal:</label>
            <input type="email" id="email" placeholder="cliente@email.com" class="input-moderno">
        </div>
        <div class="col-5">
            <label>Celular / WhatsApp:</label>
            <input type="text" id="telefone" required placeholder="(00) 00000-0000" class="input-moderno">
        </div>
    </div>
    
    <!-- Linha 3 (Logística - Já estava igual: 2, 8, 2) -->
    <div class="form-grid">
        <div class="col-2">
            <label>CEP:</label>
            <input type="text" id="cep" placeholder="12400-000" maxlength="9" class="input-moderno">
        </div>
        <div class="col-8">
            <label>Logradouro (Rua):</label>
            <input type="text" id="rua" readonly class="input-moderno readonly">
        </div>
        <div class="col-2">
            <label>Número:</label>
            <input type="text" id="numero" required placeholder="0" class="input-moderno">
        </div>
    </div>

    <!-- Linha 4 (Endereço - Corrigido para igualar ao Fornecedor: 5, 5, 2) -->
    <div class="form-grid">
        <div class="col-5">
            <label>Bairro:</label>
            <input type="text" id="bairro" readonly class="input-moderno readonly">
        </div>
        <div class="col-5">
            <label>Cidade:</label>
            <input type="text" id="cidade" readonly class="input-moderno readonly">
        </div>
        <div class="col-2">
            <label>Estado (UF):</label>
            <input type="text" id="uf" readonly class="input-moderno readonly">
        </div>
    </div>

    <div style="text-align: right; margin-top: 15px;">
        <button type="submit" style="padding: 10px 20px; background-color: var(--sucesso); color: white; border: none; border-radius: 5px; font-weight: 600; cursor: pointer;">Salvar Cliente</button>
    </div>
</form>
</form>
 </div>

        <div class="card-form">
            <h3>Base de Clientes Ativos</h3>
            <table>
                <thead>
                    <tr><th>ID</th><th>Nome</th><th>CPF</th><th>Contato</th></tr>
                </thead>
                <tbody id="tabelaClientes"></tbody>
            </table>
        </div>
    </div>

    <script src="js/clientes.js"></script>
</body>
</html>
